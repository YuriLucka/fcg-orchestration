apiVersion: v1
kind: Secret
metadata:
  name: catalog-db-secret
  namespace: fcg
type: Opaque
stringData:
  MSSQL_SA_PASSWORD: "Your_strong_Pass1"
  ACCEPT_EULA: "Y"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-db
  namespace: fcg
spec:
  replicas: 1
  selector:
    matchLabels:
      app: catalog-db
  template:
    metadata:
      labels:
        app: catalog-db
    spec:
      containers:
        - name: catalog-db
          image: mcr.microsoft.com/mssql/server:2022-latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 1433
          envFrom:
            - secretRef:
                name: catalog-db-secret
          volumeMounts:
            - name: data
              mountPath: /var/opt/mssql
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: catalog-db
  namespace: fcg
spec:
  selector:
    app: catalog-db
  ports:
    - port: 1433
      targetPort: 1433
